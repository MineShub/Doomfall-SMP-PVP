<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREMIUM MC PVP TOURNAMENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --neon-green: #55FF55;
            --cyber-gold: #FFD700;
            --discord-blurple: #5865F2;
            --bg-dark: #050505;
            --accent-purple: #6e00ff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
            perspective: 1000px;
        }

        .title-font { font-family: 'Syncopate', sans-serif; }

        /* Animated Gradient Background */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            width: 100%;
            height: 100%;
            background: linear-gradient(125deg, #050505, #12002b, #050505, #001220);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Core */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        /* Text Glitch Effect */
        .glitch {
            position: relative;
            display: inline-block;
        }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
        }
        .glitch:hover::before {
            left: 2px;
            text-shadow: -2px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }
        .glitch:hover::after {
            left: -2px;
            text-shadow: -2px 0 #00fff9, 2px 2px #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 1s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); }
            20% { clip: rect(62px, 9999px, 42px, 0); }
            40% { clip: rect(12px, 9999px, 65px, 0); }
            60% { clip: rect(85px, 9999px, 11px, 0); }
            80% { clip: rect(55px, 9999px, 78px, 0); }
            100% { clip: rect(2px, 9999px, 33px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(10px, 9999px, 85px, 0); }
            100% { clip: rect(80px, 9999px, 20px, 0); }
        }

        /* Card Neon Glow & Hover */
        .nav-card {
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }
        .nav-card:hover {
            transform: translateY(-12px) scale(1.03);
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--cyber-gold);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }
        .nav-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s;
        }
        .nav-card:hover::after {
            opacity: 1;
        }

        .radial-glow {
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            animation: pulse-glow 2s infinite ease-in-out;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 0 50px rgba(255, 215, 0, 0.6); }
        }

        .blurple-gradient {
            background: linear-gradient(135deg, #5865F2 0%, #4752C4 100%);
        }

        /* Scrollbar Hide */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen w-full flex items-center justify-center p-4">

    <div id="bg-canvas"></div>

    <!-- Sidebar -->
    <div id="sidebar" class="fixed top-4 left-4 h-[calc(100vh-32px)] w-72 glass rounded-3xl transform -translate-x-[120%] z-50 p-8 flex flex-col items-center shadow-2xl">
        <div class="relative group mt-4">
            <div class="absolute -inset-2 bg-gradient-to-r from-purple-600 to-blue-600 rounded-full blur opacity-20 group-hover:opacity-60 transition duration-1000"></div>
            <div class="relative w-32 h-32 bg-gray-900 rounded-full mb-6 border border-white/10 overflow-hidden">
                <img id="user-avatar" src="" alt="" class="w-full h-full object-cover opacity-0 transition-opacity duration-700">
                <div id="avatar-placeholder" class="absolute inset-0 flex items-center justify-center text-white/20">
                    <i data-lucide="user" class="w-12 h-12"></i>
                </div>
            </div>
        </div>
        
        <h3 id="user-name" class="text-xl font-black title-font mb-1 tracking-tighter uppercase text-center mt-2">LOADING...</h3>
        <div class="flex items-center gap-2 mb-10">
            <span class="w-2 h-2 bg-[#55FF55] rounded-full animate-pulse"></span>
            <span class="text-[#55FF55] text-[10px] font-black uppercase tracking-[0.2em]">Verified Elite</span>
        </div>
        
        <nav class="w-full space-y-2 flex-grow">
            <!-- Sidebar Navigation Links could go here -->
        </nav>

        <div class="w-full pt-6 border-t border-white/5">
            <button onclick="logout()" class="w-full py-3 rounded-xl hover:bg-red-500/10 transition-all text-[10px] uppercase tracking-widest font-bold text-red-500/80 hover:text-red-500 flex items-center justify-center gap-2">
                <i data-lucide="log-out" class="w-4 h-4"></i>
                Logout Session
            </button>
        </div>
    </div>

    <!-- Main Content Wrapper -->
    <div id="landing-screen" class="text-center z-10 w-full max-w-7xl mx-auto py-12">
        <h1 class="glitch title-font text-4xl md:text-7xl lg:text-8xl font-black mb-16 tracking-tighter italic select-none" data-text="MC PVP TOURNAMENT">
            MC <span class="text-[#55FF55]">PVP</span> <span class="text-[#FFD700]">TOURNAMENT</span>
        </h1>

        <div id="action-container" class="flex flex-col items-center justify-center gap-12">
            <!-- Initial Verify Button -->
            <button id="verify-btn" onclick="redirectToDiscord()" class="blurple-gradient flex items-center gap-5 text-white font-black py-6 px-12 rounded-2xl shadow-2xl transform transition-all hover:scale-105 active:scale-95 group">
                <i data-lucide="shield-check" class="w-7 h-7"></i>
                <span class="tracking-[0.3em] uppercase text-sm">Verify via Discord</span>
            </button>

            <!-- Verified Menu (Hidden Initially) -->
            <div id="verified-content" class="hidden w-full flex flex-col items-center">
                <button id="start-btn" class="radial-glow bg-[#FFD700] text-black font-black py-6 px-24 text-4xl rounded-2xl shadow-2xl transition-all hover:scale-110 active:scale-90 title-font mb-20 inline-block uppercase italic tracking-tighter">
                    START
                </button>

                <!-- 4-Card Menu -->
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 w-full px-4 opacity-0 translate-y-10" id="menu-cards">
                    <div class="nav-card glass p-8 rounded-3xl cursor-pointer group">
                        <div class="text-[#FFD700] mb-6 flex justify-between items-start">
                            <i data-lucide="trophy" class="w-10 h-10 group-hover:animate-bounce"></i>
                            <span class="text-xs font-black opacity-20">01</span>
                        </div>
                        <h4 class="title-font text-sm tracking-[0.2em] font-bold text-white/90">STANDINGS</h4>
                        <p class="text-[10px] text-white/40 mt-2 uppercase tracking-widest">Global Rank & Stats</p>
                    </div>

                    <div class="nav-card glass p-8 rounded-3xl cursor-pointer group">
                        <div class="text-[#FFD700] mb-6 flex justify-between items-start">
                            <i data-lucide="swords" class="w-10 h-10 group-hover:rotate-12 transition-transform"></i>
                            <span class="text-xs font-black opacity-20">02</span>
                        </div>
                        <h4 class="title-font text-sm tracking-[0.2em] font-bold text-white/90">MATCHES</h4>
                        <p class="text-[10px] text-white/40 mt-2 uppercase tracking-widest">Live & Upcoming</p>
                    </div>

                    <div class="nav-card glass p-8 rounded-3xl cursor-pointer group">
                        <div class="text-[#FFD700] mb-6 flex justify-between items-start">
                            <i data-lucide="shield" class="w-10 h-10 group-hover:scale-110 transition-transform"></i>
                            <span class="text-xs font-black opacity-20">03</span>
                        </div>
                        <h4 class="title-font text-sm tracking-[0.2em] font-bold text-white/90">ADMIN</h4>
                        <p class="text-[10px] text-white/40 mt-2 uppercase tracking-widest">Control Panel</p>
                    </div>

                    <div class="nav-card glass p-8 rounded-3xl cursor-pointer group">
                        <div class="text-[#FFD700] mb-6 flex justify-between items-start">
                            <i data-lucide="crown" class="w-10 h-10 group-hover:animate-pulse"></i>
                            <span class="text-xs font-black opacity-20">04</span>
                        </div>
                        <h4 class="title-font text-sm tracking-[0.2em] font-bold text-white/90">PLAYOFFS</h4>
                        <p class="text-[10px] text-white/40 mt-2 uppercase tracking-widest">Final Brackets</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Discord Configuration ---
        const CLIENT_ID = '1477950063941783604';
        
        // Dynamic Redirect URI based on current environment
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        /**
         * Redirect to Discord OAuth2
         */
        function redirectToDiscord() {
            const scope = encodeURIComponent('identify');
            const encodedRedirect = encodeURIComponent(REDIRECT_URI);
            const authUrl = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodedRedirect}&response_type=token&scope=${scope}`;
            window.location.href = authUrl;
        }

        /**
         * Handle Hash Token & Session
         */
        async function handleAuth() {
            const hash = window.location.hash;
            const params = new URLSearchParams(hash.slice(1));
            const accessToken = params.get('access_token');

            if (accessToken) {
                window.history.replaceState({}, document.title, window.location.pathname);
                localStorage.setItem('dc_session_token', accessToken);
                await fetchDiscordProfile(accessToken, true);
            } else {
                const savedToken = localStorage.getItem('dc_session_token');
                if (savedToken) await fetchDiscordProfile(savedToken, false);
            }
        }

        async function fetchDiscordProfile(token, isNewLogin) {
            try {
                const response = await fetch('https://discord.com/api/v10/users/@me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Expired');

                const user = await response.json();
                renderDashboard(user, isNewLogin);
            } catch (err) {
                console.error("Auth Error:", err);
                localStorage.removeItem('dc_session_token');
            }
        }

        function renderDashboard(user, animate) {
            // Update Sidebar
            const avatarImg = document.getElementById('user-avatar');
            const nameTxt = document.getElementById('user-name');
            const placeholder = document.getElementById('avatar-placeholder');

            nameTxt.innerText = user.username;
            if (user.avatar) {
                avatarImg.src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=512`;
                avatarImg.onload = () => {
                    avatarImg.style.opacity = '1';
                    placeholder.style.opacity = '0';
                };
            }

            // UI State Change
            document.getElementById('verify-btn').classList.add('hidden');
            document.getElementById('verified-content').classList.remove('hidden');

            // Animations
            if (animate) {
                // Spring effect slide-in
                anime({
                    targets: '#sidebar',
                    translateX: ['-120%', 0],
                    duration: 1500,
                    easing: 'easeOutElastic(1, .6)'
                });

                anime({
                    targets: '#start-btn',
                    scale: [0.5, 1],
                    opacity: [0, 1],
                    duration: 1000,
                    easing: 'easeOutExpo'
                });

                anime({
                    targets: '#menu-cards',
                    translateY: [60, 0],
                    opacity: [0, 1],
                    delay: 300,
                    duration: 1200,
                    easing: 'easeOutExpo'
                });
            } else {
                document.getElementById('sidebar').style.transform = 'translateX(0)';
                document.getElementById('menu-cards').style.opacity = '1';
                document.getElementById('menu-cards').style.transform = 'translateY(0)';
            }
        }

        function logout() {
            localStorage.removeItem('dc_session_token');
            window.location.reload();
        }

        // Initialize Lucide Icons
        lucide.createIcons();

        // Check auth on load
        window.addEventListener('load', handleAuth);
    </script>
</body>
</html>
